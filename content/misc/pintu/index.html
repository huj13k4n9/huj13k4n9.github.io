<html>

<head>
    <title>拼图带师</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>

<body background="image/bg.png" style=" background-repeat:no-repeat ;
background-size:100% 100%; 
background-attachment: fixed;">
    <div style="text-align:center">
        <h1>规则：将拼图还原成<br><img src="image/s.jpg" width="200" height="200"></img>
        </h1>
        <img id="s1" src="image/s1.png" onclick="move(1)" width="100" height="100"></img>
        <img id="s2" src="image/s2.png" onclick="move(2)" width="100" height="100"></img>
        <img id="s3" src="image/s3.png" onclick="move(3)" width="100" height="100"></img>
        <br/>
        <img id="s4" src="image/s4.png" onclick="move(4)" width="100" height="100"></img>
        <img id="s5" src="image/s5.png" onclick="move(5)" width="100" height="100"></img>
        <img id="s6" src="image/s6.png" onclick="move(6)" width="100" height="100"></img>
        <br/>
        <img id="s7" src="image/s7.png" onclick="move(7)" width="100" height="100"></img>
        <img id="s8" src="image/s8.png" onclick="move(8)" width="100" height="100"></img>
        <img id="s9" src="image/s9.png" onclick="move(9)" width="100" height="100"></img>
        <p id="rc"></p>
        <audio src="yingliu.mp3" loop="true" hidden="true" autoplay></audio>
    </div>
    <script>
        var box = new Array();
        for (var i = 0; i < 3; i++)
            box[i] = new Array();
        var step = 0;

        function getRand() {
            var i, j, k, rand;
            var arr = new Array();
            for (i = 0; i < 3; i++)
                for (j = 0; j < 3; j++) {
                    while (1) {
                        rand = Math.ceil(Math.random() * 9);
                        for (k = 0; k < arr.length; k++)
                            if (arr[k] == rand)
                                break;
                        if (k == arr.length)
                            break;
                    }
                    box[i][j] = rand;
                    arr.push(rand);
                }
        }

        function init() {
            var i, j, k, m, s, x;
            while (1) {
                x = 0;
                getRand();
                for (i = 0; i < 3; i++)
                    for (j = 0; j < 3; j++)
                        if (box[i][j] != 9)
                            for (k = i, s = 0; k < 3; k++)
                                for (m = j - s; m < 3; m++) {
                                    if (box[k][m] < box[i][j])
                                        x++;
                                    s = j;
                                }
                if (x % 2 == 0)
                    break;
            }
        }

        function print() {
            var i, j;
            for (i = 0; i < 3; i++)
                for (j = 0; j < 3; j++)
                    if (box[i][j] == 9)
                        document.getElementById("s" + (i * 3 + j + 1).toString()).src = "image/s0.png";
                    else
                        document.getElementById("s" + (i * 3 + j + 1).toString()).src = "image/s" + box[i][j].toString() + ".png";
        }

        function isWin() {
            var i, j;
            for (i = 0; i < 3; i++)
                for (j = 0; j < 3; j++)
                    if (box[i][j] != i * 3 + j + 1)
                        return false;
            document.getElementById("s9").src = "image/s9.png";
            return true;
        }

        function move(x) {
            var i, j;
            j = (x - 1) % 3;
            i = (x - 1 - j) / 3;
            if (box[i][j] == 9)
                return;
            if (i - 1 >= 0 && box[i - 1][j] == 9) {
                box[i - 1][j] = box[i][j];
                box[i][j] = 9;
                step++;
            } else if (i + 1 <= 2 && box[i + 1][j] == 9) {
                box[i + 1][j] = box[i][j];
                box[i][j] = 9;
                step++;
            } else if (j - 1 >= 0 && box[i][j - 1] == 9) {
                box[i][j - 1] = box[i][j];
                box[i][j] = 9;
                step++;
            } else if (j + 1 <= 2 && box[i][j + 1] == 9) {
                box[i][j + 1] = box[i][j];
                box[i][j] = 9;
                step++;
            }
        }

        function start() {
            var count = 0;
            document.getElementById("rc").innerHTML = "步数：" + step + " 时间：" + count;
            var sre = setInterval(function() {
                count++;
                document.getElementById("rc").innerHTML = "步数：" + step + " 时间：" + count;
            }, 1000);
            var spr = setInterval(function() {
                print();
                if (isWin()) {
                    alert("你赢了!宁就是拼图带师！");
                    clearInterval(spr);
                    clearInterval(sre);
                }
            }, 1);
        }

        function main() {
            init();
            start();
        }
        main();
    </script>
</body>

</html>
