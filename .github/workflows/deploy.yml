name: Deploy Hugo Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-hugo-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build Blog Site
        run: hugo --gc --buildDrafts --minify

      - name: Upload Artifact
        id: artifact-upload-step
        uses: actions/upload-artifact@v4
        with:
          name: hugo-blog
          path: public/
          if-no-files-found: error

      - name: Invoke Webhook
        run: |
          response=$(curl -s -X POST \
            -d "hash=${{ steps.artifact-upload-step.outputs.artifact-digest }}" \
            -H "Authorization: Bearer ${{ secrets.AUTH_TOKEN }}" \
            ${{ secrets.WEBHOOK_URL }})

          status=$(echo "$response" | jq -r '.status')

          if [ "$status" = "failed" ]; then
            echo "Webhook invocation failed."
            exit 1
          else
            echo "Webhook invoked successfully."
          fi
